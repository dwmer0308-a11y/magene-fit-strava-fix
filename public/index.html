<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>迈金 FIT 坐标修正</title>
    <meta name="theme-color" content="#f4f7f8">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="tool-panel" aria-labelledby="title">
        <h1 id="title">迈金 FIT 坐标修正</h1>

        <div class="controls">
          <label class="file-picker">
            <span>上传 FIT 文件</span>
            <input id="fitFiles" type="file" accept=".fit,.FIT,application/octet-stream" multiple>
          </label>
        </div>

        <div class="actions">
          <button id="downloadAllBtn" type="button" disabled>下载修正 FIT</button>
          <button id="openStravaBtn" type="button">打开 Strava 上传</button>
        </div>

        <details class="trace-panel">
          <summary>查看处理记录与溯源</summary>

          <div id="message" class="message" role="status">本地处理，不上传文件。网页只能读取你手动选择的 FIT。</div>

          <section class="summary-grid" aria-label="处理摘要">
            <div>
              <span>文件</span>
              <strong id="fileCount">-</strong>
            </div>
            <div>
              <span>坐标记录</span>
              <strong id="coordinateCount">-</strong>
            </div>
            <div>
              <span>已修正</span>
              <strong id="changedCount">-</strong>
            </div>
            <div>
              <span>平均位移</span>
              <strong id="averageShift">-</strong>
            </div>
            <div>
              <span>CRC</span>
              <strong id="crcStatus">-</strong>
            </div>
          </section>

          <div id="resultList" class="result-list">
            <p class="muted">尚未处理文件。</p>
          </div>

          <pre id="details">尚未处理文件。</pre>
        </details>
      </section>
    </main>

    <script src="app.js?v=20260709-ios-glass"></script>
  </body>
</html>
